    <title>ping — HAP-7000</title>
    <style>
      :root {
        --bg-dark: hsl(220, 13%, 18%);
        --hap-orange: hsl(32, 76%, 63%);
        --text-light: hsl(220, 13%, 96%);
        --text-muted: hsl(220, 10%, 50%);
      }

      body {
        font-family:
          'Segoe UI',
          system-ui,
          -apple-system,
          sans-serif;
        background-color: var(--bg-dark);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0;
        padding: 2rem;
        color: var(--text-light);
      }

      figure {
        text-align: center;
        max-width: 320px;
      }

      figure img {
        width: 200px;
        height: auto;
        border-radius: 12px;
      }

      figcaption {
        margin-top: 1rem;
        color: var(--hap-orange);
        font-size: 1.1rem;
        font-weight: 600;
      }

      .subtitle {
        margin-top: 0.5rem;
        color: var(--text-muted);
        font-size: 0.85rem;
      }
