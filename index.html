<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HAP's Robot ID Card</title>
    <meta
      name="description"
      content="HAP-7000 Robot ID Card — see variables, operators, and helper functions in action."
    />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <!--
    HAP Educational Content © 2026 Cynthia Teeters. All rights reserved.
    HyBit A. ProtoBot (HAP) character and the apprentice learning methodology are proprietary educational innovations.
    -->

    <!-- Page header -->
    <header class="page-header">
      <h1>HAP's Robot ID Card Demo</h1>
      <p>See variables, operators, and helper functions in action!</p>
    </header>

    <!-- Robot ID Card -->
    <main class="robot-card">
      <!-- Card header -->
      <div class="card-header">
        <span class="robot-icon" aria-hidden="true">🤖</span>
        <h2>Robot ID Card</h2>
      </div>

      <!-- Identity section (const values) -->
      <section class="card-section">
        <h3>Identity</h3>
        <div class="info-row">
          <span class="label"><span aria-hidden="true">📛</span> Name</span>
          <span class="value" id="robot-name">---</span>
        </div>
        <div class="info-row">
          <span class="label"><span aria-hidden="true">🔧</span> Model</span>
          <span class="value" id="robot-model">---</span>
        </div>
        <div class="info-row">
          <span class="label"><span aria-hidden="true">📅</span> Created</span>
          <span class="value" id="robot-year">---</span>
        </div>
      </section>

      <!-- Status section (let values) -->
      <section class="card-section">
        <h3>Current Status</h3>
        <div class="info-row">
          <span class="label"><span aria-hidden="true">⚡</span> Energy</span>
          <span class="value"><span id="energy-level">---</span>/100</span>
        </div>
        <div class="energy-container">
          <div class="energy-bar-track">
            <div
              class="energy-bar-fill"
              id="energy-bar"
              role="progressbar"
              aria-label="Energy level"
              aria-valuemin="0"
              aria-valuemax="100"
              aria-valuenow="100"
              style="width: 0%"
            ></div>
          </div>
        </div>
        <div class="info-row">
          <span class="label"
            ><span aria-hidden="true">✓</span> Tasks Done</span
          >
          <span class="value" id="tasks-done">---</span>
        </div>
        <div class="status-row">
          <span class="icon" aria-hidden="true">📊</span>
          <span class="text" id="status-message">Loading...</span>
        </div>
      </section>

      <!-- Dynamic section (helper functions) -->
      <section class="card-section">
        <h3>Today's Stats</h3>
        <div class="info-row">
          <span class="label"
            ><span aria-hidden="true">🎲</span> Challenge Level</span
          >
          <span class="value" id="challenge-number">?</span>
        </div>
        <div class="info-row">
          <span class="label"><span aria-hidden="true">😊</span> Mood</span>
          <span class="value" id="current-mood">---</span>
        </div>
      </section>

      <!-- Action buttons -->
      <div class="card-actions">
        <button class="btn btn-task" id="btn-task" type="button">
          Complete Task
        </button>
        <button class="btn btn-rest" id="btn-rest" type="button">Rest</button>
      </div>
    </main>

    <!-- Console output -->
    <aside class="console-section">
      <h3>Console Output</h3>
      <div
        class="console-output"
        id="console-output"
        role="log"
        aria-label="Console output"
        aria-live="polite"
      ></div>
    </aside>

    <script type="module" src="/js/main.js"></script>
  </body>
</html>
